name: Build and Deploy to Heroku

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Removed Heroku CLI/install step — using Railway (auto-deploy) instead

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Copy frontend build into backend
        run: mkdir -p backend/frontend && cp -a frontend/dist backend/frontend/dist

      - name: Install backend dependencies
        run: npm --prefix backend install

      # Deployment handled by Railway auto-deploy from the connected GitHub repo.
      # If you want Action-based Railway deploys, provide RAILWAY_API_TOKEN and
      # we can add a CLI deploy step; for now this workflow only builds the app.
